name: Release

on:
  push:
    tags:
      - 'v*' # triggers on v1.0.0, v1.2.3, etc.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v__VERSION__'
          releaseBody: |
            Scarica il file appropriato per il tuo sistema operativo dagli assets qui sotto.

            ### macOS — Prima apertura
            Poiché l'app non è firmata con un certificato Apple Developer, macOS potrebbe bloccarla.
            Se compare un avviso, usa uno di questi metodi:

            **Metodo 1 (raccomandato):** Apri il Terminale ed esegui:
            ```
            xattr -cr "/Applications/Filtra Fatture.app"
            ```
            Poi apri normalmente l'app.

            **Metodo 2:** Tasto destro sull'app → "Apri" → "Apri" nel dialogo di conferma.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}